services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow
    environment:
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    restart: unless-stopped

  analytics-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-backend
    working_dir: /app
    env_file:
      - .env
    command: ["python", "-m", "uvicorn", "src.api_server:app", "--host", "0.0.0.0", "--port", "8005", "--reload"]
    ports:
      - "8005:8005"
    environment:
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      PYTHONPATH: /app
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
      - /app/.git
    depends_on:
      - mlflow
    restart: unless-stopped

  langsmith-sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langsmith-sync-worker
    working_dir: /app
    env_file:
      - .env
    command: ["python", "run_langsmith_sync_worker.py"]
    environment:
      PYTHONPATH: /app
      LANGSMITH_SYNC_ENABLED: "1"
      LANGSMITH_SYNC_INTERVAL_SEC: "120"
      LANGSMITH_SYNC_LIMIT: "200"
      LANGSMITH_SYNC_LOOKBACK_DAYS: "14"
      LANGSMITH_SYNC_USE_CHECKPOINT: "1"
      LANGSMITH_SYNC_PIPELINE_KEY: "langsmith_root_runs"
      LANGSMITH_SYNC_SAFETY_LOOKBACK_MINUTES: "5"
      # Optional override. Falls back to LANGCHAIN_PROJECT/LANGSMITH_PROJECT when empty.
      LANGSMITH_SYNC_PROJECT: ""
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
      - /app/.git
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dtc-frontend
    command: ["node", "node_modules/vite/bin/vite.js", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.git
    depends_on:
      - analytics-api
    restart: unless-stopped

volumes:
  mlflow_data:
  frontend_node_modules: