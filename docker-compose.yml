services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    volumes:
      - phoenix_data:/root/.phoenix
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow
    environment:
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    restart: unless-stopped

  analytics-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-backend
    working_dir: /app
    env_file:
      - .env
    command: ["python", "-m", "uvicorn", "src.api_server:app", "--host", "0.0.0.0", "--port", "8005", "--reload"]
    ports:
      - "8005:8005"
    environment:
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      PYTHONPATH: /app
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
      - /app/.git
    depends_on:
      - phoenix
      - mlflow
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dtc-frontend
    command: ["node", "node_modules/vite/bin/vite.js", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8005"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.git
    depends_on:
      - analytics-api
    restart: unless-stopped

volumes:
  phoenix_data:
  mlflow_data:
  frontend_node_modules: